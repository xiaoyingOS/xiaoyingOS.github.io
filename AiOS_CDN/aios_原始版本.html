<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOS 智能助手</title>
    <style>
        :root {
            --glass-color: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --setting-icon-color: #ffd700;
            --setting-bg-color: transparent;
            --transition-fast: 0.15s;
            --transition-medium: 0.3s;
            --bg-color: #333333;
            --panel-bg: rgba(0, 0, 0, 0.5);
            --chat-container-bg: #333333;
            --chat-messages-bg: rgba(0, 0, 0, 0.5);
            --input-bg: rgba(255, 255, 255, 0.1);
            --message-bg: rgba(0, 0, 0, 0.2);
            --user-message-bg: rgba(100, 100, 255, 0.15);
            --reasoning-bg: rgba(0, 0, 0, 0.3);
            --reasoning-header-bg: rgba(138, 43, 226, 0.1);
            --tool-bg: rgba(138, 43, 226, 0.1);
            --api-config-bg: rgba(0, 0, 0, 0.3);
            --api-config-content-bg: rgba(0, 0, 0, 0.2);
            --input-field-bg: rgba(0, 0, 0, 0.5);
            --border-color: rgba(138, 43, 226, 0.2);
            --expand-indicator-color: rgba(255, 255, 255, 0.7);
            --expand-indicator-hover: rgba(255, 255, 255, 1);
            --text-color-secondary: rgba(255, 255, 255, 0.7);
            --text-color-tertiary: rgba(255, 255, 255, 0.85);
            --text-color-code: #fff;
        }

        /* 亮色主题 */
        body.light-theme {
            --text-color: #333333;
            --bg-color: #ffffff;
            --panel-bg: #ffffff;
            --chat-container-bg: #ffffff;
            --chat-messages-bg: rgba(0, 0, 0, 0.03);
            --input-bg: rgba(0, 0, 0, 0.05);
            --message-bg: rgba(248, 248, 255, 0.5);
            --user-message-bg: rgba(248, 248, 255, 0.5);
            --reasoning-bg: rgba(0, 0, 0, 0.05);
            --reasoning-header-bg: rgba(138, 43, 226, 0.08);
            --tool-bg: rgba(138, 43, 226, 0.05);
            --api-config-bg: rgba(0, 0, 0, 0.05);
            --api-config-content-bg: rgba(0, 0, 0, 0.03);
            --input-field-bg: rgba(0, 0, 0, 0.05);
            --border-color: rgba(138, 43, 226, 0.3);
            --expand-indicator-color: rgba(0, 0, 0, 0.5);
            --expand-indicator-hover: rgba(0, 0, 0, 0.8);
            --text-color-secondary: rgba(0, 0, 0, 0.6);
            --text-color-tertiary: rgba(0, 0, 0, 0.75);
            --text-color-code: #333;
        }

        body.light-theme, body.light-theme html {
            background: var(--bg-color);
        }

        body.light-theme .aios-panel {
            background: var(--panel-bg);
        }

        body.light-theme .chat-container {
            background: var(--chat-container-bg);
        }

        body.light-theme .chat-messages {
            background: var(--chat-messages-bg);
        }

        body.light-theme #chatInput {
            background: var(--input-bg);
        }

        body.light-theme .message-content {
            background: var(--message-bg);
        }

        body.light-theme .user-content {
            background: var(--user-message-bg);
        }

        body.light-theme .reasoning-container {
            background: var(--reasoning-bg);
        }

        body.light-theme .reasoning-header {
            background: var(--reasoning-header-bg);
        }

        body.light-theme .tool-card {
            background: var(--tool-bg);
        }

        body.light-theme .ai-tool-item {
            background: var(--tool-bg);
        }

        body.light-theme .api-config-container {
            background: var(--api-config-bg);
        }

        body.light-theme .api-config-content {
            background: var(--api-config-content-bg);
        }

        body.light-theme .api-config-item input,
        body.light-theme .api-config-item select {
            background: var(--input-field-bg);
            color: var(--text-color);
        }

        body.light-theme .api-config-title,
        body.light-theme .api-config-toggle,
        body.light-theme .api-config-item label {
            color: var(--text-color);
        }

        body.light-theme .expand-indicator {
            color: var(--expand-indicator-color);
        }

        body.light-theme .expand-indicator:hover {
            color: var(--expand-indicator-hover);
        }

        body.light-theme .reasoning-toggle,
        body.light-theme .reasoning-title {
            color: var(--text-color-secondary);
        }

        body.light-theme .reasoning-content {
            color: var(--text-color);
        }

        body.light-theme .reasoning-content h1,
        body.light-theme .reasoning-content h2,
        body.light-theme .reasoning-content h3,
        body.light-theme .reasoning-content h4,
        body.light-theme .reasoning-content h5,
        body.light-theme .reasoning-content h6,
        body.light-theme .reasoning-content strong {
            color: var(--text-color);
        }

        body.light-theme .reasoning-content blockquote {
            color: var(--text-color-tertiary);
        }

        body.light-theme .reasoning-content code {
            color: var(--text-color-code);
        }

        body.light-theme .reasoning-content a {
            color: rgba(138, 43, 226, 0.9);
        }

        body.light-theme .reasoning-content a:hover {
            color: #8a2be2;
        }

        body.light-theme .tool-card h4,
        body.light-theme .tool-name {
            color: var(--text-color);
        }

        body.light-theme .tool-card p {
            color: var(--text-color-secondary);
        }

        body.light-theme .aios-tab-btn {
            color: var(--text-color);
        }

        body.light-theme .message-actions,
        body.light-theme .reasoning-copy,
        body.light-theme .message-action-icon {
            color: var(--text-color-secondary);
        }

        body.light-theme .message-actions:hover,
        body.light-theme .reasoning-copy:hover,
        body.light-theme .message-action-icon:hover {
            color: var(--text-color);
        }

        /* 覆盖所有硬编码的白色文字 */
        body.light-theme .api-config-btn,
        body.light-theme .theme-toggle-btn,
        body.light-theme .aios-send-btn,
        body.light-theme .aios-tool-btn,
        body.light-theme .aios-action-btn {
            color: white !important;
        }

        body.light-theme .aios-tabs-horizontal .aios-tab-btn.active,
        body.light-theme .aios-tab-btn.active {
            color: white !important;
        }

        body.light-theme .api-save-btn,
        body.light-theme .api-test-btn,
        body.light-theme .api-reset-btn,
        body.light-theme .api-close-btn {
            color: white !important;
        }

        body.light-theme .api-test-btn {
            color: #2c3e50 !important;
        }

        body.light-theme .message-content code,
        body.light-theme .message-content pre code {
            color: var(--text-color-code) !important;
        }

        body.light-theme #mathPreviewContent {
            color: var(--text-color) !important;
        }

        body.light-theme .stop-message {
            color: var(--text-color-secondary) !important;
        }

        /* 消息内容样式覆盖 */
        body.light-theme .message-content p,
        body.light-theme .user-content p {
            color: var(--text-color) !important;
        }

        body.light-theme .message-content h1,
        body.light-theme .message-content h2,
        body.light-theme .message-content h3,
        body.light-theme .message-content h4,
        body.light-theme .message-content h5,
        body.light-theme .message-content h6,
        body.light-theme .message-content strong,
        body.light-theme .message-content em {
            color: var(--text-color) !important;
        }

        body.light-theme .message-content blockquote {
            color: var(--text-color-tertiary) !important;
        }

        /* Inline code (不在pre中的code) 使用纯色 */
        body.light-theme .message-content > p > code,
        body.light-theme .message-content > li > code,
        body.light-theme .message-content > td > code,
        body.light-theme .reasoning-content > p > code,
        body.light-theme .reasoning-content > li > code {
            color: var(--text-color-code) !important;
        }

        /* 代码块中的代码使用highlight.js的样式 */
        body.light-theme .message-content pre code,
        body.light-theme .reasoning-content pre code {
            color: inherit !important;
        }

        body.light-theme .message-content ul,
        body.light-theme .message-content ol {
            color: var(--text-color) !important;
        }

        body.light-theme .message-content li {
            color: var(--text-color) !important;
        }

        body.light-theme .message-content a {
            color: rgba(138, 43, 226, 0.9) !important;
        }

        body.light-theme .message-content a:hover {
            color: #8a2be2 !important;
        }

        body.light-theme .message-content table {
            color: var(--text-color) !important;
        }

        body.light-theme .message-content th,
        body.light-theme .message-content td {
            color: var(--text-color) !important;
        }

        body.light-theme .message-content tr:nth-child(even) {
            color: var(--text-color) !important;
        }

        body.light-theme .message-content hr {
            border-top: 1px solid rgba(138, 43, 226, 0.3) !important;
        }

        /* 用户消息内容样式覆盖 */
        body.light-theme .user-content p {
            color: var(--text-color) !important;
        }

        /* 思考过程样式覆盖 */
        body.light-theme .reasoning-content p {
            color: var(--text-color) !important;
        }

        body.light-theme .reasoning-content h1,
        body.light-theme .reasoning-content h2,
        body.light-theme .reasoning-content h3,
        body.light-theme .reasoning-content h4,
        body.light-theme .reasoning-content h5,
        body.light-theme .reasoning-content h6,
        body.light-theme .reasoning-content strong {
            color: var(--text-color) !important;
        }

        body.light-theme .reasoning-content blockquote {
            color: var(--text-color-tertiary) !important;
        }

        body.light-theme .reasoning-content ul,
        body.light-theme .reasoning-content ol {
            color: var(--text-color) !important;
        }

        body.light-theme .reasoning-content li {
            color: var(--text-color) !important;
        }

        body.light-theme .reasoning-content table {
            color: var(--text-color) !important;
        }

        body.light-theme .reasoning-content th,
        body.light-theme .reasoning-content td {
            color: var(--text-color) !important;
        }

        body.light-theme .reasoning-content tr:nth-child(even) {
            color: var(--text-color) !important;
        }

        body.light-theme .reasoning-content hr {
            border-top: 1px solid rgba(138, 43, 226, 0.3) !important;
        }

        /* 代码块样式 - 亮色主题 */
        body.light-theme .message-content pre,
        body.light-theme .reasoning-content pre {
            background: var(--input-field-bg) !important;
            border-color: rgba(138, 43, 226, 0.3) !important;
            color: inherit !important;
        }

        body.light-theme .message-content pre code,
        body.light-theme .reasoning-content pre code {
            background: transparent !important;
            border: none !important;
            color: inherit !important;
        }

        /* 确保 highlight.js 样式表的优先级最高 */
        #hljs-dark-theme,
        #hljs-light-theme {
            background: none !important;
        }

        /* 聊天控制按钮样式覆盖 */
        body.light-theme .chat-controls-container span {
            color: var(--text-color-secondary) !important;
        }

        body.light-theme .chat-controls-container span:hover {
            color: var(--text-color) !important;
        }

        body.light-theme #chatTrackBtn,
        body.light-theme #chatTopBtn,
        body.light-theme #chatBottomBtn,
        body.light-theme #voiceBtn,
        body.light-theme #chatClearBtn,
        body.light-theme #closeAiosBtn {
            color: var(--text-color-secondary) !important;
        }

        body.light-theme #chatTrackBtn:hover,
        body.light-theme #chatTopBtn:hover,
        body.light-theme #chatBottomBtn:hover,
        body.light-theme #voiceBtn:hover,
        body.light-theme #chatClearBtn:hover,
        body.light-theme #closeAiosBtn:hover {
            color: var(--text-color) !important;
        }

        /* 数学快捷键样式覆盖 */
        body.light-theme .math-shortcut {
            color: var(--text-color) !important;
        }

        /* API配置区域样式覆盖 */
        body.light-theme .api-config-header {
            color: var(--text-color) !important;
        }

        body.light-theme .api-config-title,
        body.light-theme .api-config-toggle {
            color: var(--text-color) !important;
        }

        body.light-theme .api-config-item label {
            color: var(--text-color) !important;
        }

        body.light-theme .api-config-item input::placeholder,
        body.light-theme .api-config-item select {
            color: var(--text-color-secondary) !important;
        }

        /* API面板样式覆盖 */
        body.light-theme .api-panel h2 {
            color: var(--text-color) !important;
        }

        /* 工具卡片样式覆盖 */
        body.light-theme .tool-card h4 {
            color: var(--text-color) !important;
        }

        body.light-theme .tool-card p {
            color: var(--text-color-secondary) !important;
        }

        /* AI工具项样式覆盖 */
        body.light-theme .tool-name {
            color: var(--text-color) !important;
        }

        body.light-theme .tool-icon {
            filter: none !important;
        }

        /* 标签页样式覆盖 */
        body.light-theme .aios-tabs-horizontal .aios-tab-btn {
            color: var(--text-color) !important;
        }

        body.light-theme .aios-tab-btn {
            color: var(--text-color) !important;
        }

        /* 输入框样式覆盖 */
        body.light-theme #chatInput::placeholder {
            color: var(--text-color-secondary) !important;
        }

        /* 聊天消息区域样式覆盖 */
        body.light-theme .ai-avatar,
        body.light-theme .user-avatar {
            filter: none !important;
        }

        /* 通用的覆盖规则 - 确保所有文字都是黑色，但排除代码高亮 */
        body.light-theme *:not(.api-config-btn):not(.theme-toggle-btn):not(.aios-send-btn):not(.aios-tool-btn):not(.aios-action-btn):not(.api-save-btn):not(.api-test-btn):not(.api-reset-btn):not(.api-close-btn):not(.aios-tab-btn):not(.aios-tabs-horizontal .aios-tab-btn):not(.hljs):not(pre):not(code):not(pre *):not(code *) {
            color: var(--text-color) !important;
        }

        body.light-theme .sidebar-search input::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }

        /* 恢复按钮的白色文字 */
        body.light-theme .api-config-btn,
        body.light-theme .theme-toggle-btn,
        body.light-theme .aios-send-btn,
        body.light-theme .aios-tool-btn,
        body.light-theme .aios-action-btn,
        body.light-theme .api-save-btn,
        body.light-theme .api-reset-btn,
        body.light-theme .api-close-btn {
            color: white !important;
        }

        body.light-theme .api-test-btn {
            color: #2c3e50 !important;
        }

        body.light-theme .aios-tab-btn.active,
        body.light-theme .aios-tabs-horizontal .aios-tab-btn.active {
            color: white !important;
        }

        body.light-theme .aios-tab-btn:not(.active),
        body.light-theme .aios-tabs-horizontal .aios-tab-btn:not(.active) {
            color: var(--text-color) !important;
        }

        /* 扩展控制样式覆盖 */
        body.light-theme .expand-controls {
            color: var(--text-color-secondary) !important;
        }

        /* 错误消息样式覆盖 */
        body.light-theme .ai-message .message-content p[style*="rgba(231, 76, 60, 0.9)"] {
            color: rgba(231, 76, 60, 0.9) !important;
        }

        /* 主题切换按钮样式 */
        .theme-toggle-btn {
            padding: 3px 6px;
            border: none;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0);
            color: white;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: 600;
            transition: all 0.3s;
            width: auto;
            height: auto;
            min-width: 30px;
            max-width: 300px;
            display: inline-block;
            text-align: center;
            line-height: 1.2;
            vertical-align: middle;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .theme-toggle-btn:hover {
            background: rgba(138, 43, 226, 0.8);
            transform: scale(1.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: auto;
            color: var(--text-color);
            position: relative;
            user-select: text;
            background: #333333;
        }

        /* AIOS面板 - 优化性能 */
        .aios-panel {
            position: fixed;
            top: 0;
            left: 0;
            transform: none;
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            padding: 0;
            border-radius: 0;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: none;
            box-shadow:
                0 0 15px rgba(138, 43, 226, 0.4),
                0 0 30px rgba(75, 0, 130, 0.3),
                0 0 45px rgba(138, 43, 226, 0.2),
                inset 0 0 20px rgba(138, 43, 226, 0.1);
            z-index: 997;
            opacity: 1;
            pointer-events: all;
            transition: opacity var(--transition-medium);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            will-change: opacity;
        }

        /* 手机端优化 */
        @media (max-width: 768px) {
            .chat-sidebar {
                width: 50px;
            }

            .chat-controls-container {
                right: 10px !important;
                top: calc(50% - 50px) !important;
            }

            #closeAiosBtn {
                display: none !important;
            }

            .aios-panel {
                width: 100vw;
                height: 100vh;
                max-width: 100vw;
                max-height: 100vh;
                padding: 0;
                border-radius: 0;
            }

            .aios-tabs {
                flex-direction: row;
                gap: 5px;
                margin-bottom: 20px;
            }

            .aios-tab-btn {
                width: 80px !important;
                height: 40px !important;
                min-width: 80px !important;
                max-width: 80px !important;
                min-height: 40px !important;
                max-height: 40px !important;
                font-size: 0.8em !important;
                box-sizing: border-box !important;
            }

            .chat-container {
                padding: 15px;
            }

            .chat-messages {
                height: 350px;
            }

            .chat-input-container {
                flex-direction: column;
                gap: 10px;
            }

            #chatInput {
                padding: 15px;
                font-size: 16px;
            }

            .aios-send-btn {
                width: 40px !important;
                height: 40px !important;
                min-width: 40px !important;
                max-width: 40px !important;
                min-height: 40px !important;
                max-height: 40px !important;
                font-size: 1em !important;
                box-sizing: border-box !important;
            }

            .analysis-tools {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .tool-card {
                padding: 15px;
            }

            .ai-tools-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .ai-tool-item {
                padding: 15px 10px;
            }

            .aios-actions {
                flex-direction: column;
                gap: 10px;
            }

            .aios-action-btn {
                padding: 18px;
                font-size: 1em;
            }
        }

        .aios-tabs {
            display: none;
        }

        .aios-tabs-horizontal {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .aios-tabs-horizontal .aios-tab-btn {
            width: 91px !important;
            height: 40px !important;
            min-width: 91px !important;
            max-width: 91px !important;
            min-height: 40px !important;
            max-height: 40px !important;
            padding: 0;
            border: none;
            border-radius: 6px;
            background: rgba(138, 43, 226, 0.2);
            color: var(--text-color);
            cursor: pointer;
            transition: all var(--transition-medium);
            font-size: 0.9em !important;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box !important;
            flex-direction: column;
        }

        .aios-tabs-horizontal .aios-tab-btn.active {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.6), rgba(75, 0, 130, 0.6));
            color: white;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .aios-tabs-horizontal .aios-tab-btn:hover {
            background: rgba(138, 43, 226, 0.3);
            transform: translateY(-2px);
        }

        .aios-tabs-horizontal .aios-tab-btn.active:hover {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.7), rgba(75, 0, 130, 0.7));
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5);
        }

        @media (max-width: 768px) {
            .aios-tabs {
                display: flex !important;
                flex-direction: row;
                gap: 5px;
                margin-bottom: 20px;
            }

            .aios-tabs-horizontal {
                display: none;
            }
        }

        .aios-tab-btn {
            width: 91px !important;
            height: 69px !important;
            min-width: 91px !important;
            max-width: 91px !important;
            min-height: 69px !important;
            max-height: 69px !important;
            padding: 0;
            border: none;
            border-radius: 6px;
            background: rgba(138, 43, 226, 0.2);
            color: var(--text-color);
            cursor: pointer;
            transition: all var(--transition-medium);
            font-size: 1.2em !important;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box !important;
            flex-direction: column;
        }

        .aios-tab-btn.active {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.6), rgba(75, 0, 130, 0.6));
            color: white;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .aios-tab-btn:hover {
            background: rgba(138, 43, 226, 0.3);
            transform: translateY(-2px);
        }

        .aios-tab-btn.active:hover {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.7), rgba(75, 0, 130, 0.7));
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5);
        }

        .aios-tab-content {
            display: none;
        }

            animation-delay: -0.32s;

            }

                transform: scale(1);
                opacity: 1;
            }
        }

            to {

                transform: translateY(0);
            }

    <script>
        // 配置 marked 和 highlight.js
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            let lang = language || '';
            let highlightedCode;

            if (lang && hljs.getLanguage(lang)) {
                try {
                    highlightedCode = hljs.highlight(code, { language: lang }).value;
                } catch (err) {
                    console.error('代码高亮错误:', err);
                    highlightedCode = hljs.highlightAuto(code).value;
                    lang = '';
                }
            } else {
                highlightedCode = hljs.highlightAuto(code).value;
                lang = '';
            }

            return `<pre><code class="hljs language-${lang}">${highlightedCode}</code></pre>`;
        };

        marked.setOptions({
            renderer: renderer,
            breaks: true,
            gfm: true
        });

        // Markdown 渲染工具函数
function renderMarkdown(content) {
            // 保护数学公式，防止被 marked.js 错误解析
            const mathPlaceholders = [];

            // 修复缺失的右括号：查找 \\( ... \标点 这种情况，在 \ 后添加 )
            // 例如：\( r =2 \，应该修复为 \( r =2 \)，
            content = content.replace(/\\\(.*?\\(?!\))(?=[，。！？；：]|$)/g, (match) => {
                // match = \( r =2 \
                // 需要变成 \( r =2 \)
                return match + ')';
            });

            // 保护块级公式 \[ ... \] - 使用更独特的占位符，支持跨行
            content = content.replace(/\\\[(.*?)\\\]/gs, (match, formula) => {
                const placeholder = `🔢MATHBLOCK${mathPlaceholders.length}🔢`;
                mathPlaceholders.push({ type: 'block', formula: formula.trim() });
                return placeholder;
            });

            // 保护行内公式 \( ... \)
            content = content.replace(/\\\((.*?)\\\)/gs, (match, formula) => {
                const placeholder = `🔢MATHINLINE${mathPlaceholders.length}🔢`;
                mathPlaceholders.push({ type: 'inline', formula: formula.trim() });
                return placeholder;
            });

            // 先渲染 Markdown
            let html = marked.parse(content);

            // 创建临时 DOM 元素来处理代码块
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;

            // 为所有代码块添加语言标签和复制按钮
            const codeBlocks = tempDiv.querySelectorAll('pre code');
            codeBlocks.forEach((codeBlock) => {
                const pre = codeBlock.parentElement;
                // 匹配 hljs 的 class 格式: hljs language-xxx
                const languageMatch = codeBlock.className.match(/language-(\w+)/);
                const language = languageMatch ? languageMatch[1] : (codeBlock.className.match(/hljs/) ? 'code' : 'text');

                // 创建代码头部
                const header = document.createElement('div');
                header.className = 'code-header';
                header.innerHTML = `
                    <span>${language}</span>
                    <button class="copy-btn" onclick="copyCode(this)">复制</button>
                `;

                // 在 pre 之前插入 header
                pre.parentNode.insertBefore(header, pre);
            });

            // 恢复数学公式占位符
            let result = tempDiv.innerHTML;
            mathPlaceholders.forEach((item, index) => {
                const placeholder = item.type === 'block' 
                    ? `🔢MATHBLOCK${index}🔢` 
                    : `🔢MATHINLINE${index}🔢`;
                
                // 使用全局替换
                while (result.indexOf(placeholder) !== -1) {
                    if (item.type === 'block') {
                        result = result.replace(placeholder, `\\[${item.formula}\\]`);
                    } else {
                        result = result.replace(placeholder, `\\(${item.formula}\\)`);
                    }
                }
            });

            return result;
        }

        // 复制代码函数
        function copyCode(button) {
            const codeBlock = button.parentElement.nextElementSibling.querySelector('code');
            const code = codeBlock.textContent;

            navigator.clipboard.writeText(code).then(() => {
                const originalText = button.textContent;
                button.textContent = '已复制!';
                setTimeout(() => {
                    button.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                button.textContent = '复制失败';
                setTimeout(() => {
                    button.textContent = '复制';
                }, 2000);
            });
        }

        // 渲染数学公式
        function renderMath(element) {
            renderMathInElement(element, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false
            });
        }

        const App = {
            // 性能监控
            performance: {
                startTime: performance.now(),
                measure: function(name) {
                    return performance.now() - this.startTime;
                }
            },

            // 全局缓存系统
            cache: {
                dom: new Map(),
                results: new Map(),
                calculations: new Map(),
                maxSize: 100,

                get(key) {
                    const value = this.results.get(key);
                    if (value) {
                        this.results.delete(key);
                        this.results.set(key, value);
                    }
                    return value;
                },

                set(key, value) {
                    if (this.results.size >= this.maxSize) {
                        const firstKey = this.results.keys().next().value;
                        this.results.delete(firstKey);
                    }
                    this.results.set(key, value);
                },
                has(key) {
                    return this.results.has(key);
                },

                clear() {
                    this.results.clear();
                }
            },

            // IndexedDB 存储管理
            storage: {
                db: null,
                DB_NAME: 'AIOS_DB',
                DB_VERSION: 1,
                STORES: {
                    API_CONFIG: 'apiConfig',
                    CHAT_HISTORY: 'chatHistory',
                    SEARCH_HISTORY: 'searchHistory',
                    THEME: 'theme'
                },

                async init() {
                    return new Promise((resolve, reject) => {
                        const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);

                        request.onerror = () => {
                            console.error('IndexedDB 打开失败:', request.error);
                            reject(request.error);
                        };

                        request.onsuccess = () => {
                            this.db = request.result;
                            console.log('IndexedDB 初始化成功');
                            resolve(this.db);
                        };

                        request.onupgradeneeded = (event) => {
                            const db = event.target.result;

                            // 创建 API 配置存储
                            if (!db.objectStoreNames.contains(this.STORES.API_CONFIG)) {
                                db.createObjectStore(this.STORES.API_CONFIG, { keyPath: 'id' });
                            }

                            // 创建聊天历史存储
                            if (!db.objectStoreNames.contains(this.STORES.CHAT_HISTORY)) {
                                db.createObjectStore(this.STORES.CHAT_HISTORY, { keyPath: 'id' });
                            }

                            // 创建搜索历史存储
                            if (!db.objectStoreNames.contains(this.STORES.SEARCH_HISTORY)) {
                                db.createObjectStore(this.STORES.SEARCH_HISTORY, { keyPath: 'id' });
                            }

                            // 创建主题设置存储
                            if (!db.objectStoreNames.contains(this.STORES.THEME)) {
                                db.createObjectStore(this.STORES.THEME, { keyPath: 'id' });
                            }
                        };
                    });
                },

                async get(storeName, key) {
                    if (!this.db) {
                        console.warn('IndexedDB 未初始化，尝试从 localStorage 迁移数据');
                        return this.migrateFromLocalStorage(storeName, key);
                    }

                    return new Promise((resolve, reject) => {
                        const transaction = this.db.transaction([storeName], 'readonly');
                        const store = transaction.objectStore(storeName);
                        const request = store.get(key);

                        request.onsuccess = () => {
                            const result = request.result;
                            resolve(result ? result.value : null);
                        };

                        request.onerror = () => {
                            console.error(`从 ${storeName} 获取数据失败:`, request.error);
                            reject(request.error);
                        };
                    });
                },

                async set(storeName, key, value) {
                    if (!this.db) {
                        console.warn('IndexedDB 未初始化，降级使用 localStorage');
                        return localStorage.setItem(key, JSON.stringify(value));
                    }

                    return new Promise((resolve, reject) => {
                        const transaction = this.db.transaction([storeName], 'readwrite');
                        const store = transaction.objectStore(storeName);
                        const request = store.put({ id: key, value: value });

                        request.onsuccess = () => {
                            resolve();
                        };

                        request.onerror = () => {
                            console.error(`保存到 ${storeName} 失败:`, request.error);
                            reject(request.error);
                        };
                    });
                },

                async remove(storeName, key) {
                    if (!this.db) {
                        return localStorage.removeItem(key);
                    }

                    return new Promise((resolve, reject) => {
                        const transaction = this.db.transaction([storeName], 'readwrite');
                        const store = transaction.objectStore(storeName);
                        const request = store.delete(key);

                        request.onsuccess = () => {
                            resolve();
                        };

                        request.onerror = () => {
                            console.error(`从 ${storeName} 删除失败:`, request.error);
                            reject(request.error);
                        };
                    });
                },

                async clear(storeName) {
                    if (!this.db) {
                        return localStorage.clear();
                    }

                    return new Promise((resolve, reject) => {
                        const transaction = this.db.transaction([storeName], 'readwrite');
                        const store = transaction.objectStore(storeName);
                        const request = store.clear();

                        request.onsuccess = () => {
                            resolve();
                        };

                        request.onerror = () => {
                            console.error(`清空 ${storeName} 失败:`, request.error);
                            reject(request.error);
                        };
                    });
                },

                migrateFromLocalStorage(storeName, key) {
                    try {
                        const lsKey = this.getLocalStorageKey(storeName, key);
                        const value = localStorage.getItem(lsKey);
                        if (value !== null) {
                            const parsed = JSON.parse(value);
                            // 异步迁移到 IndexedDB
                            this.init().then(() => {
                                this.set(storeName, key, parsed).then(() => {
                                    localStorage.removeItem(lsKey);
                                    console.log(`已从 localStorage 迁移 ${lsKey} 到 IndexedDB`);
                                });
                            });
                            return parsed;
                        }
                        return null;
                    } catch (e) {
                        console.error('从 localStorage 迁移失败:', e);
                        return null;
                    }
                },

                getLocalStorageKey(storeName, key) {
                    switch (storeName) {
                        case this.STORES.API_CONFIG:
                            return 'apiConfig';
                        case this.STORES.CHAT_HISTORY:
                            return 'chatHistory';
                        case this.STORES.SEARCH_HISTORY:
                            return 'searchHistory';
                        case this.STORES.THEME:
                            return 'aios-theme';
                        default:
                            return key;
                    }
                }
            },

            // DOM元素缓存
            elements: {},

            // 声音控制变量
            audio: {
                context: null,
                oscillator: null,
                gainNode: null,
                isPlaying: false,

                init() {
                    if (!this.context) {
                        this.context = new (window.AudioContext || window.webkitAudioContext)();
                        this.gainNode = this.context.createGain();
                        this.gainNode.connect(this.context.destination);
                        this.gainNode.gain.value = 0.06;
                    }
                    return this.context;
                },

                play(type, freq, duration = 0.3) {
                    if (!App.elements.soundToggle.checked) return;

                    const audioCtx = this.init();

                    if (this.isPlaying && this.oscillator) {
                        this.oscillator.stop();
                    }

                    this.oscillator = audioCtx.createOscillator();
                    this.oscillator.connect(this.gainNode);
                    this.oscillator.type = type;
                    this.oscillator.frequency.setValueAtTime(parseFloat(freq), audioCtx.currentTime);
                    this.oscillator.start(0);
                    this.oscillator.stop(audioCtx.currentTime + duration);
                    this.isPlaying = true;

                    setTimeout(() => {
                        this.isPlaying = false;
                    }, duration * 1000);
                }
            },

            // 振动控制
            vibration: {
                patterns: {
                    'short': 50,
                    'medium': 200,
                    'long': 500,
                    'rhythm': [100, 50, 100],
                    'heartbeat': [100, 100, 100, 300],
                    'custom': [200, 100, 200]
                },

                trigger(patternName) {
                    if (!App.elements.vibrateToggle.checked || !navigator.vibrate) return;

                    const pattern = this.patterns[patternName];
                    const strength = parseInt(App.elements.vibrationStrength.value);
                    let adjustedPattern;

                    if (Array.isArray(pattern)) {
                        adjustedPattern = pattern.map(val => Math.min(val * strength / 5, 1000));
                    } else {
                        adjustedPattern = Math.min(pattern * strength / 5, 1000);
                    }

                    navigator.vibrate(adjustedPattern);
                }
            },

            // 搜索数据库
            searchData: {
                functions: [
                    { name: 'sin', description: '正弦函数', example: 'sin(x)', category: 'functions' },
                    { name: 'cos', description: '余弦函数', example: 'cos(x)', category: 'functions' },
                    { name: 'tan', description: '正切函数', example: 'tan(x)', category: 'functions' },
                    { name: 'log', description: '对数函数', example: 'log(x)', category: 'functions' },
                    { name: 'ln', description: '自然对数', example: 'ln(x)', category: 'functions' },
                    { name: 'sqrt', description: '平方根', example: 'sqrt(x)', category: 'functions' },
                    { name: 'exp', description: '指数函数', example: 'exp(x)', category: 'functions' },
                    { name: 'abs', description: '绝对值', example: 'abs(x)', category: 'functions' },
                    { name: 'derivative', description: '求导', example: 'derivative(x^2)', category: 'operations' },
                    { name: 'integral', description: '积分', example: 'integral(x^2)', category: 'operations' }
                ],
                constants: [
                    { name: 'pi', description: '圆周率 π', example: 'pi', category: 'constants' },
                    { name: 'e', description: '自然常数', example: 'e', category: 'constants' },
                    { name: 'i', description: '虚数单位', example: 'i', category: 'constants' }
                ],
                examples: [
                    { name: '二次函数求导', description: 'x² 的导数', example: 'derivative(x^2)', category: 'examples' },
                    { name: '三角函数积分', description: 'sin(x) 的积分', example: 'integral(sin(x))', category: 'examples' },
                    { name: '复合函数', description: 'e^x + ln(x)', example: 'exp(x) + ln(x)', category: 'examples' },
                    { name: '平方根计算', description: '√(x² + 1)', example: 'sqrt(x^2 + 1)', category: 'examples' }
                ]
            },

            // 搜索历史（将在初始化后从 IndexedDB 加载）
            searchHistory: [],

            // 聊天位置跟踪
            chatTracking: {
                lastExpandedMessage: null,
                trackExpandedMessage: function(messageElement) {
                    this.lastExpandedMessage = messageElement;
                },
                returnToPosition: function() {
                    if (this.lastExpandedMessage) {
                        let targetElement = this.lastExpandedMessage;

                        if (targetElement.classList.contains('ai-message')) {
                            const reasoningContainer = targetElement.querySelector('.reasoning-container');
                            if (reasoningContainer) {
                                targetElement = reasoningContainer;
                            }
                        }

                        const messageRect = targetElement.getBoundingClientRect();
                        const chatMessages = App.elements.chatMessages;
                        const chatRect = chatMessages.getBoundingClientRect();

                        const relativeTop = messageRect.top - chatRect.top + chatMessages.scrollTop;

                        chatMessages.scrollTo({
                            top: relativeTop - 50,
                            behavior: 'smooth'
                        });

                        this.addVisualFeedback(targetElement);
                    } else {
                        App.chat.showInfoMessage('没有记录的回展位置，请先点击思考过程的回展按钮');
                    }
                },
                addVisualFeedback: function(messageElement) {
                    const originalBorder = messageElement.style.border;
                    const originalBoxShadow = messageElement.style.boxShadow;

                    messageElement.style.border = '2px solid rgba(241, 196, 15, 0.8)';
                    messageElement.style.boxShadow = '0 0 15px rgba(241, 196, 15, 0.6)';
                    messageElement.style.transition = 'border 0.3s, box-shadow 0.3s';

                    setTimeout(() => {
                        messageElement.style.border = originalBorder;
                        messageElement.style.boxShadow = originalBoxShadow;
                    }, 2000);
                }
            },

            // API配置管理
            apiConfig: {
                defaultConfig: {
                    url: 'https://apis.iflow.cn/v1/chat/completions',
                    key: 'sk-07f5c088f32838e9d121dad3bc76a2e4',
                    model: 'glm-4.6',

                async callStreamAPI(messages, onChunk, abortController) {
                    const config = await this.getConfig();

                    this.streamBuffer = '';
                    let requestActive = true;
                    let reader = null;
                    let response = null;

                    const handleAbort = () => {
                        console.log('收到取消请求，正在停止...');
                        requestActive = false;

                        if (reader) {
                            try {
                                reader.cancel('用户停止生成').catch(e => {
                                    console.log('取消reader时的预期错误:', e);
                                });
                            } catch (e) {
                                console.log('取消reader时出错:', e);
                            }
                        }

                        if (abortController) {
                            try {
                                abortController.abort('用户停止生成');
                            } catch (e) {
                                console.log('取消请求时出错:', e);
                            }
                        }
                    };

                    if (abortController.signal.aborted) {
                        console.log('请求在开始前已被取消');
                        return;
                    }

                    abortController.signal.addEventListener('abort', handleAbort);

                    try {
                        console.log('=== AIOS API调用开始 ===');
                        console.log('API URL:', config.url);
                        console.log('使用模型:', config.model);
                        console.log('Temperature:', config.temperature);
                        console.log('Max Tokens:', config.maxTokens);

                        let messagesArray;
                        if (typeof messages === 'string') {
                            messagesArray = [
                                { role: 'user', content: messages }
                            ];
                            console.log('发送消息:', messages);
                        } else if (Array.isArray(messages)) {
                            messagesArray = messages;
                            console.log('发送消息数组:', JSON.stringify(messages, null, 2));
                        } else {
                            throw new Error('消息格式错误，应该是字符串或数组');
                        }

                        const requestBody = {
                            model: config.model,
                            messages: messagesArray,
                            temperature: parseFloat(config.temperature),
                            max_tokens: parseInt(config.maxTokens),
                            stream: true
                        };

                        console.log('请求体:', JSON.stringify(requestBody, null, 2));

                        const response = await fetch(config.url, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${config.key}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(requestBody),
                            signal: abortController.signal
                        });

                        if (abortController.signal.aborted) {
                            console.log('请求在发送后但处理响应前被取消');
                            throw new DOMException('请求被取消', 'AbortError');
                        }

                        console.log('响应状态:', response.status, response.statusText);

                        if (!response.ok) {
                            console.error('API请求失败，状态码:', response.status);
                            throw new Error(`API请求失败，状态码: ${response.status}`);
                        }

                        console.log('开始处理流式响应...');

                        reader = response.body.getReader();
                        const decoder = new TextDecoder();
                        let chunkCount = 0;

                        while (requestActive && !abortController.signal.aborted) {
                            try {
                                if (abortController.signal.aborted) {
                                    console.log('检测到取消信号，停止读取数据');
                                    break;
                                }

                                const { done, value } = await reader.read();
                                if (done) {
                                    console.log('流式响应完成，总共接收到', chunkCount, '个数据块');
                                    break;
                                }

                                if (abortController.signal.aborted) {
                                    console.log('读取数据后检测到取消信号');
                                    break;
                                }

                                const chunk = decoder.decode(value, { stream: true });
                                chunkCount++;

                                console.log(`--- 数据块 #${chunkCount} ---`);
                                console.log('原始数据长度:', chunk.length);

                                let buffer = (this.streamBuffer || '') + chunk;
                                let processedLines = [];

                                const dataSections = buffer.split(/data:\s*/);

                                for (let i = 0; i < dataSections.length && requestActive && !abortController.signal.aborted; i++) {
                                    const section = dataSections[i].trim();
                                    if (!section) continue;

                                    if (section === '[DONE]') {
                                        console.log('收到流式结束标记 [DONE]');
                                        requestActive = false;
                                        return;
                                    }

                                    let jsonStr = '';
                                    let braceCount = 0;
                                    let inString = false;
                                    let escapeNext = false;

                                    for (let j = 0; j < section.length; j++) {
                                        const char = section[j];

                                        if (escapeNext) {
                                            escapeNext = false;
                                            jsonStr += char;
                                            continue;
                                        }

                                        if (char === '\\') {
                                            escapeNext = true;
                                            jsonStr += char;
                                            continue;
                                        }

                                        if (char === '"' && !escapeNext) {
                                            inString = !inString;
                                            jsonStr += char;
                                            continue;
                                        }

                                        if (!inString) {
                                            if (char === '{') {
                                                braceCount++;
                                            } else if (char === '}') {
                                                braceCount--;
                                            }
                                        }

                                        jsonStr += char;

                                        if (braceCount === 0 && jsonStr.startsWith('{')) {
                                            break;
                                        }
                                    }

                                    if (jsonStr && jsonStr.startsWith('{') && braceCount === 0) {
                                        try {
                                            const data = JSON.parse(jsonStr);
                                            processedLines.push(data);
                                        } catch (e) {
                                            console.error('解析JSON失败:', e);
                                        }
                                    }
                                }

                                const lastSection = dataSections[dataSections.length - 1];
                                const hasIncompleteJson = lastSection && !lastSection.includes('}') && lastSection.trim();

                                if (hasIncompleteJson) {
                                    this.streamBuffer = lastSection;
                                } else {
                                    this.streamBuffer = '';
                                }

                                for (const data of processedLines) {
                                    if (abortController.signal.aborted) {
                                        console.log('处理数据前检测到取消信号');
                                        requestActive = false;
                                        return;
                                    }

                                    const delta = data.choices?.[0]?.delta;

                                    if (delta?.content && delta.content.trim()) {
                                        onChunk(delta.content, 'content');
                                    }

                                    if (delta?.reasoning_content && delta.reasoning_content.trim()) {
                                        onChunk(delta.reasoning_content, 'reasoning');
                                    }

                                    if (data.choices?.[0]?.finish_reason) {
                                        console.log('流式响应完成原因:', data.choices[0].finish_reason);
                                        requestActive = false;
                                        return;
                                    }
                                }
                            } catch (readError) {
                                if (readError.name === 'AbortError' || abortController.signal.aborted) {
                                    console.log('读取数据时检测到取消信号');
                                    requestActive = false;
                                    break;
                                } else {
                                    throw readError;
                                }
                            }
                        }

                        requestActive = false;

                    } catch (error) {
                        console.log('=== AIOS API调用结束 ===');
                        requestActive = false;

                        abortController.signal.removeEventListener('abort', handleAbort);

                        if (error.name === 'AbortError' || abortController.signal.aborted) {
                            console.log('API请求已被取消');
                            return;
                        } else {
                            console.error('流式API调用错误:', error);
                            console.error('错误详情:', {
                                name: error.name,
                                message: error.message,
                                stack: error.stack
                            });
                            throw error;
                        }
                    } finally {
                        abortController.signal.removeEventListener('abort', handleAbort);
                    }
                }
            },

                        }
                        prevElement = prevElement.previousElementSibling;
                    }
                    return null;

                // 删除指定消息之后的所有消息
                async removeMessagesAfter(messageDiv, includeCurrent = true) {
                    let nextElement = includeCurrent ? messageDiv : messageDiv.nextElementSibling;
                    const messagesToRemove = [];

                    while (nextElement) {
                        if (nextElement.classList.contains('ai-message') || nextElement.classList.contains('user-message')) {
                            messagesToRemove.push(nextElement);
                            nextElement = nextElement.nextElementSibling;
                        } else {
                            break;
                        }
                    }

                    messagesToRemove.forEach(msg => msg.remove());

                    if (messagesToRemove.length > 0) {
                        this.messages = this.messages.slice(0, -messagesToRemove.length);
                        await this.saveHistory();
                    }
                },

                async regenerateAIResponse(userMessageText) {

                },

                    let role, content, reasoning;

                        // 新方式：消息对象
                        role = msg.role;
                        content = msg.content;

                            if (chatInput.placeholder.includes('编辑中')) {
                                this.cancelEdit();

                        }

                updateMathPreview() {
                    const chatInput = App.elements.chatInput;

                    if (!preview || !previewContent) return;

                    const text = chatInput.value;

                    // 检查是否包含数学公式标记
                    const hasMath = /\$\$.*\$\$|\$.*\$|\\\(.*\\\)|\\\[.*\\\]/.test(text);

                    if (hasMath) {
                        preview.style.display = 'block';
                        // 创建一个临时容器来渲染公式
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = text;
                        renderMath(tempDiv);

                            this.stopGeneration();

                            if (content) {
