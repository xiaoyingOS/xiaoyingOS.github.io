                exportChat() {
                    if (this.messages.length === 0) {
                        this.showInfoMessage('没有可导出的对话内容');
                        return;
                    }

                    // 直接导出 messages 数组的 JSON 格式
                    const jsonContent = JSON.stringify(this.messages, null, 2);

                    // 创建下载
                    const blob = new Blob([jsonContent], { type: 'application/json;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `AIOS对话_${new Date().toISOString().slice(0, 10)}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    this.showSuccessMessage('对话内容已导出');
                },

                // 保存当前对话到历史记录
                async saveCurrentConversation() {
                    let conversationId = App.chat.currentConversationId;

                    if (!conversationId) {
                        conversationId = Date.now().toString();
                        App.chat.currentConversationId = conversationId;
                    }

                    const conversation = {
                        id: conversationId,
                        title: this.getConversationTitle(),
                        messages: [...this.messages],
                        createdAt: new Date().toISOString()
                    };

                    // 获取所有历史对话
                    let conversations = [];
                    try {
                        const saved = await App.storage.get(App.storage.STORES.CHAT_HISTORY, 'conversations');
                        if (saved) {
                            conversations = saved;
                        }
                    } catch (e) {
                        console.error('获取历史对话失败:', e);
                    }

                    // 查找是否已存在该对话
                    const existingIndex = conversations.findIndex(conv => conv.id === conversationId);
                    if (existingIndex !== -1) {
                        // 更新现有对话
                        conversations[existingIndex] = conversation;
                        // 移到最前面
                        conversations.splice(existingIndex, 1);
                        conversations.unshift(conversation);
                    } else {
                        // 添加新对话
                        conversations.unshift(conversation);
                    }

                    // 保存到 IndexedDB
                    await App.storage.set(App.storage.STORES.CHAT_HISTORY, 'conversations', conversations);
                },

                // 获取对话标题
                getConversationTitle() {
                    // 查找第一个用户消息作为标题
                    const firstUserMessage = this.messages.find(msg => msg.role === 'user');
                    if (firstUserMessage && firstUserMessage.content) {
                        const title = firstUserMessage.content.replace(/<[^>]*>/g, '').trim();
                        return title.length > 30 ? title.substring(0, 30) + '...' : title;
                    }
                    return '新对话 ' + new Date().toLocaleString();
                },

                // 批量删除选中对话
                async batchDeleteSelectedConversations() {
                    if (this.selectedConversationIds.length === 0) {
                        this.showErrorMessage('请先选择要删除的对话');
                        return;
                    }

                    const confirmed = confirm(`确定要删除选中的 ${this.selectedConversationIds.length} 条对话吗？`);
                    if (!confirmed) return;

                    let conversations = [];
                    try {
                        const saved = await App.storage.get(App.storage.STORES.CHAT_HISTORY, 'conversations');
                        if (saved) {
                            conversations = saved;
                        }
                    } catch (e) {
                        console.error('获取历史对话失败:', e);
                        return;
                    }

                    // 过滤掉选中的对话
                    conversations = conversations.filter(conv => !this.selectedConversationIds.includes(conv.id));

                    // 保存更新后的对话列表
                    await App.storage.set(App.storage.STORES.CHAT_HISTORY, 'conversations', conversations);

                    // 如果删除的对话包含当前对话，清空当前对话ID
                    if (this.selectedConversationIds.includes(App.chat.currentConversationId)) {
                        App.chat.currentConversationId = null;
                    }

                    // 清空选择状态
                    this.selectedConversationIds = [];

                    // 重新渲染历史列表
                    await this.renderHistoryList();

                    this.showSuccessMessage(`已删除 ${this.selectedConversationIds.length} 条对话`);
                },

                // 删除全部对话
                async deleteAllConversations() {
                    const confirmed = confirm('确定要删除所有历史对话吗？此操作不可恢复！');
                    if (!confirmed) return;

                    try {
                        await App.storage.set(App.storage.STORES.CHAT_HISTORY, 'conversations', []);

                        // 清空当前对话ID
                        App.chat.currentConversationId = null;

                        // 清空选择状态
                        this.selectedConversationIds = [];

                        // 重新渲染历史列表
                        await this.renderHistoryList();

                        this.showSuccessMessage('已删除所有历史对话');
                    } catch (e) {
                        console.error('删除全部对话失败:', e);
                        this.showErrorMessage('删除失败');
                    }
                },

                // 切换选择模式
                toggleSelectionMode() {
                    console.log('切换选择模式前:', this.isSelectionMode);
                    this.isSelectionMode = !this.isSelectionMode;
                    console.log('切换选择模式后:', this.isSelectionMode);
                    this.selectedConversationIds = [];
                    this.renderHistoryList();
                },

                // 渲染历史对话列表
                async renderHistoryList(searchTerm = '') {
                    const historyList = App.elements.historyList;
                    if (!historyList) return;

                    // 获取所有历史对话
                    let conversations = [];
                    try {
                        const saved = await App.storage.get(App.storage.STORES.CHAT_HISTORY, 'conversations');
                        if (saved) {
                            conversations = saved;
                        }
                    } catch (e) {
                        console.error('获取历史对话失败:', e);
                    }

                    // 过滤搜索结果
                    if (searchTerm) {
                        conversations = conversations.filter(conv =>
                            conv.title.toLowerCase().includes(searchTerm)
                        );
                    }

                    // 清空列表
                    historyList.innerHTML = '';

                    // 添加批量操作按钮
                    if (conversations.length > 0) {
                        const actionButtons = document.createElement('div');
                        actionButtons.className = 'history-batch-actions';
                        actionButtons.innerHTML = `
                            <button class="batch-select-btn">${this.isSelectionMode ? '取消选择' : '批量选择'}</button>
                            <button class="delete-all-btn">全部删除</button>
                            <button class="batch-delete-btn" style="display: ${this.selectedConversationIds.length > 0 ? 'inline-block' : 'none'}">
                                删除选中 (${this.selectedConversationIds.length})
                            </button>
                        `;
                        historyList.appendChild(actionButtons);

                        const selectBtn = actionButtons.querySelector('.batch-select-btn');
                        selectBtn.addEventListener('click', () => this.toggleSelectionMode());

                        const deleteBtn = actionButtons.querySelector('.batch-delete-btn');
                        deleteBtn.addEventListener('click', () => this.batchDeleteSelectedConversations());

                        const deleteAllBtn = actionButtons.querySelector('.delete-all-btn');
                        deleteAllBtn.addEventListener('click', () => this.deleteAllConversations());
                    }

                    // 渲染对话项
                    conversations.forEach(conv => {
                        const item = document.createElement('div');
                        item.className = 'history-item' + (this.selectedConversationIds.includes(conv.id) ? ' selected' : '');
                        item.innerHTML = `
                            ${this.selectedConversationIds.length > 0 ? `<div class="history-item-checkbox"></div>` : ''}
                            <span class="history-item-title">${conv.title}</span>
                            <div class="history-item-actions">
                                <button class="history-item-action delete" data-id="${conv.id}">删除</button>
                            </div>
                        `;

                        // 删除对话
                        const deleteBtn = item.querySelector('.delete');
                        if (deleteBtn) {
                            deleteBtn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                this.deleteConversation(conv.id);
                            });
                        }

                        historyList.appendChild(item);
                    });

                    // 如果没有历史对话，显示提示
                    if (conversations.length === 0) {
                        historyList.innerHTML = '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.5);">暂无历史对话</div>';
                    }

                    // 添加拖动选择功能（始终启用）
                    this.setupDragSelection();
                },

                // 切换对话选择状态
                toggleConversationSelection(conversationId) {
                    const index = this.selectedConversationIds.indexOf(conversationId);
                    if (index > -1) {
                        this.selectedConversationIds.splice(index, 1);
                    } else {
                        this.selectedConversationIds.push(conversationId);
                    }
                    // 更新UI而不重新渲染整个列表
                    this.updateHistoryListUI();
                },

                // 更新历史列表UI（不重新渲染）
                updateHistoryListUI() {
                    const historyList = App.elements.historyList;
                    if (!historyList) return;

                    // 更新选中状态
                    const items = historyList.querySelectorAll('.history-item');
                    items.forEach(item => {
                        const deleteBtn = item.querySelector('.delete');
                        if (deleteBtn) {
                            const conversationId = deleteBtn.getAttribute('data-id');
                            if (this.selectedConversationIds.includes(conversationId)) {
                                item.classList.add('selected');
                                // 确保复选框显示
                                if (!item.querySelector('.history-item-checkbox')) {
                                    const titleSpan = item.querySelector('.history-item-title');
                                    if (titleSpan) {
                                        const checkbox = document.createElement('div');
                                        checkbox.className = 'history-item-checkbox';
                                        titleSpan.parentNode.insertBefore(checkbox, titleSpan);
                                    }
                                }
                            } else {
                                item.classList.remove('selected');
                                // 移除复选框
                                const checkbox = item.querySelector('.history-item-checkbox');
                                if (checkbox) {
                                    checkbox.remove();
                                }
                            }
                        }
                    });

                    // 更新删除按钮显示
                    const deleteBtn = historyList.querySelector('.batch-delete-btn');
                    if (deleteBtn) {
                        deleteBtn.style.display = this.selectedConversationIds.length > 0 ? 'inline-block' : 'none';
                        deleteBtn.textContent = `删除选中 (${this.selectedConversationIds.length})`;
                    }
                },

                // 设置拖动选择功能
                setupDragSelection() {
                    const historyList = App.elements.historyList;
                    let isDragging = false;
                    let startItemId = null;
                    let hasMoved = false; // 标记是否发生了拖动
                    let visitedItems = new Set(); // 记录已经访问过的项目
                    let startX = 0; // 记录鼠标按下时的X坐标
                    let startY = 0; // 记录鼠标按下时的Y坐标

                    const items = historyList.querySelectorAll('.history-item');

                    items.forEach(item => {
                        item.addEventListener('mousedown', (e) => {
                            if (e.button === 0 && !e.target.closest('.history-item-actions')) { // 左键且不是删除按钮
                                isDragging = true;
                                hasMoved = false;
                                visitedItems.clear();
                                startX = e.clientX;
                                startY = e.clientY;
                                const deleteBtn = item.querySelector('.delete');
                                if (deleteBtn) {
                                    startItemId = deleteBtn.getAttribute('data-id');
                                }
                                e.preventDefault();
                            }
                        });

                        item.addEventListener('mouseenter', (e) => {
                            if (isDragging) {
                                hasMoved = true;
                                const deleteBtn = item.querySelector('.delete');
                                if (deleteBtn) {
                                    const conversationId = deleteBtn.getAttribute('data-id');
                                    // 只选择未访问过的项目
                                    if (!visitedItems.has(conversationId)) {
                                        this.toggleConversationSelection(conversationId);
                                        visitedItems.add(conversationId);
                                    }
                                }
                            }
                        });

                        item.addEventListener('mouseup', (e) => {
                            if (isDragging) {
                                // 检查是否发生了拖动（移动距离超过5像素）
                                const moveDistance = Math.sqrt(
                                    Math.pow(e.clientX - startX, 2) + 
                                    Math.pow(e.clientY - startY, 2)
                                );

                                if (!hasMoved && moveDistance < 5) {
                                    // 如果没有拖动（只是点击）
                                    const deleteBtn = item.querySelector('.delete');
                                    if (deleteBtn) {
                                        const conversationId = deleteBtn.getAttribute('data-id');
                                        // 如果有选中的对话，则取消勾选；否则加载对话
                                        if (this.selectedConversationIds.length > 0) {
                                            if (this.selectedConversationIds.includes(conversationId)) {
                                                // 取消选中
                                                const index = this.selectedConversationIds.indexOf(conversationId);
                                                this.selectedConversationIds.splice(index, 1);
                                                this.updateHistoryListUI();
                                            } else {
                                                // 选中
                                                this.toggleConversationSelection(conversationId);
                                            }
                                        } else {
                                            // 加载对话
                                            this.loadConversation(conversationId);
                                        }
                                    }
                                }

                                isDragging = false;
                                startItemId = null;
                                hasMoved = false;
                                visitedItems.clear();
                            }
                        });
                    });

                    document.addEventListener('mouseup', () => {
                        isDragging = false;
                        startItemId = null;
                                hasMoved = false;
                                visitedItems.clear();
                    });
                },

                // 获取当前对话的ID
                getCurrentConversationId() {
                    // 通过比较消息来查找当前对话ID
                    return App.chat.currentConversationId || null;
                },

                // 加载历史对话
                async loadConversation(conversationId) {
                    console.log('加载历史对话，ID:', conversationId);
                    console.log('当前消息数量:', this.messages.length);

                    // 检查是否已经在加载这个对话（避免重复加载）
                    if (App.chat.currentConversationId === conversationId) {
                        console.log('已经在当前对话中，不需要重新加载');
                        return;
                    }

                    let conversations = [];
                    try {
                        const saved = await App.storage.get(App.storage.STORES.CHAT_HISTORY, 'conversations');
                        if (saved) {
                            conversations = saved;
                        }
                    } catch (e) {
                        console.error('获取历史对话失败:', e);
                        return;
                    }

                    const conversation = conversations.find(conv => conv.id === conversationId);
                    if (!conversation) {
                        this.showErrorMessage('对话不存在');
                        return;
                    }

                    // 加载选中的对话
                    this.messages = conversation.messages;
                    App.chat.currentConversationId = conversationId;

                    // 重新渲染消息
                    this.renderMessages();

                    // 更新历史列表
                    this.renderHistoryList();

                    // 高亮当前对话
                    this.highlightCurrentConversation(conversationId);
                },

                // 删除历史对话
                async deleteConversation(conversationId) {
                    if (!confirm('确定要删除这个对话吗？')) return;

                    let conversations = [];
                    try {
                        const saved = await App.storage.get(App.storage.STORES.CHAT_HISTORY, 'conversations');
                        if (saved) {
                            conversations = saved;
                        }
                    } catch (e) {
                        console.error('获取历史对话失败:', e);
                        return;
                    }

                    conversations = conversations.filter(conv => conv.id !== conversationId);

                    await App.storage.set(App.storage.STORES.CHAT_HISTORY, 'conversations', conversations);

                    this.renderHistoryList();
                    this.showSuccessMessage('对话已删除');
                },

                // 高亮当前对话
                highlightCurrentConversation(conversationId) {
                    const historyList = App.elements.historyList;
                    if (!historyList) return;

                    const items = historyList.querySelectorAll('.history-item');
                    items.forEach(item => {
                        const deleteBtn = item.querySelector('.delete');
                        if (deleteBtn && deleteBtn.dataset.id === conversationId) {
                            item.classList.add('active');
                        } else {
                            item.classList.remove('active');
                        }
                    });
                },

                renderMessages() {
                    const chatMessages = App.elements.chatMessages;
                    if (!chatMessages) return;

                    // 清空消息区域（保留控制按钮）
                    const controls = chatMessages.querySelector('.chat-controls-container');

                            <span id="chatBottomBtn" title="前往底部">↓底部</span>

                    // 重新绑定控制按钮的事件（只绑定一次）
                    if (!this.controlButtonsBound) {

                        const chatTrackBtn = document.getElementById('chatTrackBtn');
                        const chatClearBtn = document.getElementById('chatClearBtn');
                        const voiceBtn = document.getElementById('voiceBtn');
                        const closeAiosBtn = document.getElementById('closeAiosBtn');

                        console.log('聊天控制按钮初始化:', {
                            chatTopBtn: !!chatTopBtn,
                            chatBottomBtn: !!chatBottomBtn,
                            chatTrackBtn: !!chatTrackBtn,
                            chatClearBtn: !!chatClearBtn,
                            voiceBtn: !!voiceBtn,
                            closeAiosBtn: !!closeAiosBtn
                        });

                        if (chatTopBtn) {
                            chatTopBtn.addEventListener('click', () => {
                                console.log('点击了顶部按钮');
                                App.elements.chatMessages.scrollTo({ top: 0, behavior: 'smooth' });
                            });
                        }

                        if (chatBottomBtn) {
                            chatBottomBtn.addEventListener('click', () => {
                                console.log('点击了底部按钮');
                                App.elements.chatMessages.scrollTo({ top: App.elements.chatMessages.scrollHeight, behavior: 'smooth' });
                            });
                        }

                        if (chatTrackBtn) {
                            chatTrackBtn.addEventListener('click', () => {
                                App.chatTracking.returnToPosition();
                            });
                        }

                        if (chatClearBtn) {
                            chatClearBtn.addEventListener('click', () => {
                                App.chat.clearHistory();
                            });
                        }

                        if (voiceBtn) {
                            voiceBtn.addEventListener('click', () => {
                                if (!App.chat.voiceRecognition) {
                                    App.chat.initVoiceRecognition();

            // 修复不完整JSON的辅助方法
            fixIncompleteJson(jsonStr, fullBuffer, startIndex) {
                const fullMatch = fullBuffer.substring(startIndex);
                const dataMatch = fullMatch.match(/^data:\s*(\{.*)/);

                if (!dataMatch) return null;

                let potentialJson = dataMatch[1];
                let braceCount = 0;
                let inString = false;
                let escapeNext = false;
                let endIndex = 0;

                for (let i = 0; i < potentialJson.length; i++) {
                    const char = potentialJson[i];

                    if (escapeNext) {
                        escapeNext = false;
                        continue;
                    }

                    if (char === '\\') {
                        escapeNext = true;
                        continue;
                    }

                    if (char === '"' && !escapeNext) {
                        inString = !inString;
                        continue;
                    }

                    if (!inString) {
                        if (char === '{') {
                            braceCount++;
                        } else if (char === '}') {
                            braceCount--;
                            if (braceCount === 0) {
                                endIndex = i + 1;
                                break;
                            }
                        }
                    }
                }

                if (braceCount === 0 && endIndex > 0) {
                    return potentialJson.substring(0, endIndex);
                }

                return null;
            },
