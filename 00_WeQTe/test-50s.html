<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>50秒断开测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .log {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>视频通话50秒断开测试</h1>
    
    <div>
        <button onclick="startTest()">开始测试</button>
        <button onclick="clearLog()">清除日志</button>
    </div>
    
    <div id="testResult"></div>
    
    <div class="log" id="logOutput"></div>
    
    <script>
        let testStartTime;
        let testTimer;
        let logOutput = document.getElementById('logOutput');
        let testResult = document.getElementById('testResult');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const elapsed = testStartTime ? Date.now() - testStartTime : 0;
            const logEntry = `[${timestamp}] [${elapsed}ms] ${message}`;
            
            logOutput.textContent += logEntry + '\n';
            logOutput.scrollTop = logOutput.scrollHeight;
            
            console.log(logEntry);
            
            // 检查是否接近50秒
            if (elapsed > 45000 && elapsed < 55000) {
                showResult('接近50秒断开点！', 'warning');
            }
        }
        
        function showResult(message, type) {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            testResult.appendChild(div);
        }
        
        function startTest() {
            clearLog();
            testResult.innerHTML = '';
            testStartTime = Date.now();
            
            log('测试开始');
            showResult('测试已开始，请进行视频通话并观察是否在50秒时断开', 'success');
            
            // 每10秒记录一次
            testTimer = setInterval(() => {
                const elapsed = Date.now() - testStartTime;
                log(`测试进行中... ${Math.floor(elapsed / 1000)}秒`);
                
                if (elapsed >= 60000) {
                    clearInterval(testTimer);
                    log('测试完成：通话持续超过60秒未断开');
                    showResult('测试通过：通话持续超过60秒未断开', 'success');
                }
            }, 10000);
            
            // 监听页面卸载
            window.addEventListener('beforeunload', () => {
                if (testTimer) {
                    clearInterval(testTimer);
                }
            });
        }
        
        function clearLog() {
            logOutput.textContent = '';
            testResult.innerHTML = '';
            if (testTimer) {
                clearInterval(testTimer);
                testTimer = null;
            }
        }
        
        // 检测通话状态变化
        let isInCall = false;
        let callStartTime;
        
        // 监听storage事件来检测通话状态
        window.addEventListener('storage', (e) => {
            if (e.key === 'callState') {
                const newState = e.newValue;
                if (newState === 'in-call' && !isInCall) {
                    isInCall = true;
                    callStartTime = Date.now();
                    log('检测到通话开始');
                } else if (newState === 'ended' && isInCall) {
                    isInCall = false;
                    const duration = Date.now() - callStartTime;
                    log(`检测到通话结束，持续时间：${duration}ms`);
                    
                    if (duration > 45000 && duration < 55000) {
                        showResult(`通话在${Math.floor(duration/1000)}秒时结束，疑似50秒断开问题！`, 'error');
                    }
                }
            }
        });
        
        // 提示用户
        log('测试脚本已加载，请点击"开始测试"按钮');
    </script>
</body>
</html>
